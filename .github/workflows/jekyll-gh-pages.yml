name: Deploy to InfinityFree

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate PHP syntax
        run: |
          find . -name "*.php" \
            -not -path "./.github/*" \
            -not -path "./mailer_contact/mailer/*" \
          | while read -r file; do
              php -l "$file" || exit 1
            done

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Test FTP connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -d \
            -e "set ftp:ssl-allow no; set ftp:passive-mode yes; set net:timeout 15; open ftp://$FTP_SERVER; user $FTP_USER $FTP_PASS; ls; bye"

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > /tmp/lftp_deploy.sh << 'SCRIPT'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set net:timeout 30
          set net:max-retries 3
          set mirror:use-pget-n 3
          open ftp://$FTP_SERVER
          user $FTP_USER $FTP_PASS
          mirror -R --delete --verbose=3 \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob Dockerfile \
            --exclude-glob fly.toml \
            --exclude-glob router.php \
            . /htdocs/
          bye
          SCRIPT
          envsubst < /tmp/lftp_deploy.sh | lftp
